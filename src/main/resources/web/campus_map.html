<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Campus Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>html, body, #map { height: 100%; margin: 0; }</style>
</head>
<body>
<div id="map"></div>
<script>
    var map = L.map('map').setView([9.0322, 38.7468], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);
    window.markers = [];
    window.routeLayer = null;
    window.setLocations = function(locations) {
        window.markers.forEach(function(m) { map.removeLayer(m); });
        window.markers = [];
        locations.forEach(function(loc) {
            var m = L.marker([loc.lat, loc.lng]).addTo(map).bindPopup(loc.name);
            window.markers.push(m);
        });
    };
    window.drawRoute = function(points) {
        if (window.routeLayer) map.removeLayer(window.routeLayer);
        var latlngs = points.map(function(p) { return [p.lat, p.lng]; });
        window.routeLayer = L.polyline(latlngs, {color: '#2b6cb0', weight: 5}).addTo(map);
        map.fitBounds(window.routeLayer.getBounds(), {padding: [30, 30]});
    };
</script>
</body>
</html>
