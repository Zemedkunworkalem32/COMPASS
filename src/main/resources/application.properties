# Database Configuration
db.url=jdbc:mysql://localhost:3306/compass_db
db.user=root
db.password=
db.driver=com.mysql.cj.jdbc.Driver
db.pool.size=10
db.pool.max.lifetime=1800000

# Application Configuration
app.name=Compass Campus Complaint Management System
app.version=1.0.0
app.debug=true

# Session Configuration
session.timeout.minutes=30
session.check.interval.seconds=60

# File Upload Configuration
upload.max.size.mb=50
upload.directory=./uploads
upload.allowed.types=pdf,doc,docx,xls,xlsx,jpg,jpeg,png,gif

# Remote Reporting Configuration
remote.report.enabled=false
remote.report.url=https://api.example.com/complaints
remote.report.timeout.seconds=30
remote.report.retry.attempts=3
remote.report.retry.delay.seconds=5

# Email Configuration (Optional)
mail.enabled=false
mail.smtp.host=localhost
mail.smtp.port=587
mail.smtp.auth=true
mail.smtp.user=
mail.smtp.password=

# Logging Configuration
logging.level=INFO
logging.file.name=logs/compass.log
logging.file.max.size=10MB
logging.file.max.history=30
